<div
  class="relative inline-block"
  role="combobox"
  [attr.aria-expanded]="isSelectorOpen()"
  [attr.aria-haspopup]="'listbox'"
  [attr.aria-label]="'common.ariaLanguage' | translate"
>
  <button
    type="button"
    class="inline-flex cursor-pointer items-center justify-center gap-2 rounded-none border-2 border-black bg-white px-4 py-2.5 font-sans text-xs font-semibold uppercase tracking-[0.18em] text-black transition-colors duration-150 hover:bg-black hover:text-white focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-black disabled:pointer-events-none disabled:opacity-40 disabled:hover:bg-white disabled:hover:text-black"
    (click)="toggle()"
    [attr.aria-expanded]="isSelectorOpen()"
    [attr.aria-label]="'common.ariaLanguage' | translate"
  >
    <span class="uppercase">{{ currentLang() }}</span>
  </button>
  @if (isSelectorOpen()) {
    <ul
      class="absolute bottom-full left-0 z-50 mb-2 min-w-44 border-2 border-black bg-white py-1"
      role="listbox"
    >
      @for (opt of langService.supported; track opt.code) {
        <li role="option" [attr.aria-selected]="currentLang() === opt.code">
          <button
            type="button"
            class="flex w-full items-center gap-2 px-4 py-2.5 text-left font-sans text-xs font-semibold uppercase tracking-[0.12em] text-black transition-colors duration-150 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-black"
            [class.bg-black]="currentLang() === opt.code"
            [class.text-white]="currentLang() === opt.code"
            [class.hover:bg-black]="currentLang() !== opt.code"
            [class.hover:text-white]="currentLang() !== opt.code"
            [class.cursor-pointer]="currentLang() !== opt.code"
            (click)="selectLang(opt.code)"
          >
            <span class="uppercase">{{ opt.code }}</span>
            <span class="text-[10px] tracking-[0.14em] opacity-70">{{ opt.label }}</span>
          </button>
        </li>
      }
    </ul>
  }
</div>
