<main class="mx-auto w-full max-w-7xl px-6 py-10 md:px-10 md:py-12">
  <section class="mb-8">
    <span class="mb-4 block text-[10px] font-bold uppercase tracking-[0.2em] text-slate-500">
      {{ 'favorites.kicker' | translate }}
    </span>
    <div class="flex flex-col gap-6 border-b-2 border-black pb-8">
      <h1 class="font-serif text-5xl font-semibold leading-none tracking-tight text-slate-900 md:text-7xl">
        {{ 'favorites.title' | translate }}
      </h1>
      <p class="text-sm leading-relaxed text-slate-500">
        {{ 'favorites.subtitle' | translate }}
      </p>
    </div>
  </section>

  @if (favoriteStore.favoriteCount() > 0) {
    <section class="space-y-8">
      <div class="flex flex-wrap items-center justify-between gap-4 border-b border-slate-200 pb-6">
        <p class="text-xs font-semibold uppercase tracking-[0.2em] text-slate-500">
          {{ 'favorites.result.count' | translate: { total: favoriteStore.favoriteCount() } }}
        </p>
      </div>
      <app-books-results-grid
        [books]="favoriteStore.favorites()"
        [favoriteIds]="favoriteStore.favoriteIds()"
        (favoriteToggled)="toggleFavorite($event)"
      ></app-books-results-grid>
    </section>
  } @else {
    <app-books-empty-display [message]="'favorites.empty' | translate"></app-books-empty-display>
  }
</main>
