<div class="relative h-full w-full">
  @if (src) {
    <img
      [src]="src"
      [alt]="alt"
      loading="lazy"
      class="cursor-pointer h-full w-full object-cover grayscale transition duration-700 group-hover:scale-105 group-hover:grayscale-0"
      [class.opacity-0]="!imageLoaded"
      [class.opacity-100]="imageLoaded"
      (loadstart)="onImageLoadStart()"
      (load)="onImageLoad()"
      (error)="onImageError()"
    />
  }

  @if (!src || hasImageError) {
    <div class="absolute inset-0 flex flex-col items-center justify-center gap-3 p-6 text-center">
      <app-book-icon [size]="40" className="text-slate-400"></app-book-icon>
      <p class="text-[10px] font-semibold uppercase tracking-[0.25em] text-slate-500">
        {{ 'index.cover.noCover' | translate }}
      </p>
    </div>
  } @else if (!imageLoaded) {
    <div class="absolute inset-0 flex flex-col items-center justify-center gap-4 p-6 text-center">
      <div
        class="h-9 w-9 animate-spin rounded-full border-2 border-slate-300 border-t-slate-600"
        aria-hidden="true"
      ></div>
      <p class="text-[10px] font-semibold uppercase tracking-[0.25em] text-slate-500">
        {{ 'index.cover.loading' | translate }}
      </p>
    </div>
  }
</div>
