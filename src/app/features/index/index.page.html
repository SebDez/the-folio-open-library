<section class="mx-auto max-w-6xl flex items-center justify-center px-6 py-12">
  <div class="w-full overflow-hidden border-b-2 border-l-2 border-slate-900 bg-white">
    <div class="flex flex-col justify-center p-8 md:p-16">
      <div class="mb-12">
        <span
          class="mb-2 block text-[10px] font-semibold uppercase tracking-[0.15em] text-slate-500"
        >
          {{ 'home.kicker' | translate }}
        </span>
        <h1 class="font-serif text-5xl font-semibold tracking-tight text-slate-900 md:text-6xl">
          {{ 'home.title' | translate: homeTitleParams() }}
        </h1>
        <p class="mt-4 max-w-sm text-slate-500">
          {{ 'home.subtitle' | translate }}
        </p>
      </div>
    </div>
  </div>
</section>
